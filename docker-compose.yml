# Sobe a aplicação completa: base de dados, API e frontend.
#   docker compose up --build
# Frontend: http://localhost      API/Swagger: http://localhost:8080/swagger-ui.html
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
    ports:
      # 5433 no host para não chocar com um PostgreSQL local na 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bankdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/bankdb
      DB_USER: bank
      DB_PASSWORD: bank
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
